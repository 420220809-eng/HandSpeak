services:
  - type: web
    name: sign-language-api
    env: python
    region: oregon  # or singapore, frankfurt, ohio
    plan: free  # or starter ($7/month) for better performance
    branch: main
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements_api.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PORT
        value: 5466
    healthCheckPath: /api/health
